<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste de Cadastro de Imóveis</title>
</head>
<body>
    <h2>Cadastrar Novo Imóvel</h2>
    
    <form action="http://localhost:5000/imoveis" method="POST" enctype="multipart/form-data">
        
        <label>Título do Imóvel:</label><br>
        <input type="text" name="titulo" value="Lindo Apartamento no Centro" required><br><br>

        <label>Preço:</label><br>
        <input type="number" name="preco" value="450000" required><br><br>

        <label>Quantidade de Quartos:</label><br>
        <input type="number" name="quartos" value="3" required><br><br>

        <label>Foto ou Vídeo:</label><br>
        <input type="file" name="midia" accept="image/*, video/*" required><br><br>

        <button type="submit">Salvar Imóvel no Banco de Dados</button>
    </form>
</body>
</html>
