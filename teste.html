<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Imóvel Premium</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #E44D26; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Cadastrar Imóvel - Múltiplas Fotos</h2>
    
    <form action="http://localhost:5000/imoveis" method="POST" enctype="multipart/form-data">
        
        <label>Título:</label>
        <input type="text" name="titulo" value="Cobertura Duplex no Umarizal" required>

        <label>Descrição do Imóvel:</label>
        <textarea name="descricao" rows="4" required>Linda cobertura com vista para a baía, varanda gourmet e acabamento em porcelanato de primeira linha. Perfeita para sua família.</textarea>

        <label>Finalidade do Negócio:</label>
        <select name="finalidade" required>
            <option value="Venda">Venda</option>
            <option value="Locação" selected>Locação (Aluguel)</option>
        </select>

        <label>Preço (R$):</label>
        <input type="number" name="preco" value="6500" required>

        <label>Valor do Condomínio (R$):</label>
        <input type="number" name="valor_condominio" value="1200">

        <label>Endereço / Bairro:</label>
        <input type="text" name="endereco" value="Umarizal, Belém - PA">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Área Útil (m²):</label>
                <input type="number" name="area_util" value="180">
            </div>
            <div style="flex: 1;">
                <label>Quartos:</label>
                <input type="number" name="quartos" value="4">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Suítes:</label>
                <input type="number" name="suites" value="2">
            </div>
            <div style="flex: 1;">
                <label>Banheiros:</label>
                <input type="number" name="banheiros" value="4">
            </div>
            <div style="flex: 1;">
                <label>Vagas de Garagem:</label>
                <input type="number" name="vagas" value="3">
            </div>
        </div>

        <label>Galeria de Fotos (Selecione VÁRIAS fotos segurando CTRL ou arrastando o mouse):</label>
        <input type="file" name="galeria" accept="image/*, video/*" multiple required>

        <br><br>
        <button type="submit">Cadastrar Super Imóvel</button>
    </form>
</body>
</html>
