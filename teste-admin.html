<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador - Painel Admin</title>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #E44D26; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold;}
        .btn-login { background: #333; }
        #resultadoToken { word-wrap: break-word; color: green; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>Área Restrita - Corretores</h2>

    <div class="box">
        <h3>1. Criar a Conta (Apenas a 1ª vez)</h3>
        <p>Vai salvar a senha embaralhada no banco de dados.</p>
        <button onclick="cadastrarCasal()">Cadastrar: corretor@imobi.com / senha123</button>
    </div>

    <div class="box">
        <h3>2. Fazer Login</h3>
        <p>Vai conferir a senha e gerar o Crachá Virtual (JWT).</p>
        <button class="btn-login" onclick="fazerLogin()">Entrar no Sistema</button>
        <p id="resultadoToken"></p>
    </div>

    <script>
        const dadosLogin = {
            email: "corretor@imobi.com",
            senha: "senha123"
        };

        async function cadastrarCasal() {
            try {
                const resposta = await fetch('http://localhost:5000/admin/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosLogin)
                });
                const resultado = await resposta.json();
                if(resposta.ok) alert("Sucesso: " + resultado.mensagem);
                else alert("Erro: " + resultado.erro);
            } catch (erro) { alert("Falha na conexão com o servidor."); }
        }

        async function fazerLogin() {
            try {
                const resposta = await fetch('http://localhost:5000/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosLogin)
                });
                const resultado = await resposta.json();
                
                if(resposta.ok) {
                    document.getElementById('resultadoToken').innerText = "🔑 SEU CRACHÁ VIRTUAL (TOKEN):\n\n" + resultado.token;
                } else {
                    alert("Erro: " + resultado.erro);
                }
            } catch (erro) { alert("Falha na conexão com o servidor."); }
        }
    </script>
</body>
</html>
